version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Skip majors that are blocked on upstream peer-dep / framework lag.
    # Revisit manually when the blocker clears (peer dep widens, electron-vite
    # picks up Vite 8, xterm exposes a public viewport API).
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@xterm/xterm'
        update-types: ['version-update:semver-major']
    # Group related ecosystem bumps so a single weekly run produces one PR
    # per logical cluster instead of N flaky-rebased dependabot PRs.
    groups:
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      typescript-eslint:
        patterns:
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
      vite:
        patterns:
          - 'vite'
          - 'electron-vite'
          - '@vitejs/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      types:
        patterns:
          - '@types/*'
        exclude-patterns:
          - '@types/react'
          - '@types/react-dom'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
