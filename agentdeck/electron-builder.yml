appId: com.agentdeck.app
productName: AgentDeck
copyright: Copyright © 2025 AgentDeck

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - "!out/**/*.map"
  - node_modules/**/*
  - package.json

win:
  target:
    - target: portable
      arch:
        - x64

portable:
  artifactName: "${productName}-${version}-portable.exe"

extraMetadata:
  main: ./out/main/index.js

asar: true
asarUnpack:
  - "node_modules/node-pty/**"

npmRebuild: true
