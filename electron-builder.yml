appId: com.agentdeck.app
productName: AgentDeck
copyright: Copyright © 2025 AgentDeck

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - "!out/**/*.map"
  - package.json

win:
  target:
    - target: portable
      arch:
        - x64

portable:
  artifactName: "${productName}-${version}-portable.exe"

extraMetadata:
  main: ./out/main/index.js

asar: true
asarUnpack:
  - "node_modules/node-pty/**"

# Harden the packaged binary. The first three disable Electron's Node-runtime
# abuse vectors; the last two lock the app to its signed asar — Electron loads
# app code only from app.asar and refuses to start if its contents were tampered
# with. The integrity fuses alter the app-loading path, so the packaged .exe must
# be launch-tested after any change here.
electronFuses:
  runAsNode: false
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  onlyLoadAppFromAsar: true
  enableEmbeddedAsarIntegrityValidation: true

npmRebuild: true
