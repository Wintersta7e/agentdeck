appId: com.agentdeck.app
productName: AgentDeck
copyright: Copyright © 2025 AgentDeck

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - "!out/**/*.map"
  - package.json

win:
  target:
    - target: portable
      arch:
        - x64

portable:
  artifactName: "${productName}-${version}-portable.exe"

extraMetadata:
  main: ./out/main/index.js

asar: true
asarUnpack:
  - "node_modules/node-pty/**"

# Disable Electron's Node-runtime abuse vectors on the packaged binary. These
# do not affect normal app startup (unlike the asar-integrity fuses, which alter
# the app-loading path and need a packaged-binary launch test before enabling).
electronFuses:
  runAsNode: false
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false

npmRebuild: true
